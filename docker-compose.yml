services:
  app:
    build: .
    restart: unless-stopped
    # host-сеть: контейнеру нужен IPv6 хоста, чтобы драйвить on-demand рендер-воркеры
    # по SSH/rsync. uvicorn слушает 8000 на хосте, Caddy проксирует localhost:8000.
    network_mode: host
    env_file:
      - .env.prod
    volumes:
      - ./data/client_secret.json:/app/client_secret.json:ro
      - ./data/yt_token.json:/app/yt_token.json
      - ./data/config:/app/config
      - ./data/outputs:/app/outputs
      - ./data/media:/app/media
      # драйв воркеров: приватный SSH-ключ + окружение (для rsync кода и --env-file на воркере)
      - /root/.ssh/prometey_worker:/root/.ssh/prometey_worker:ro
      - ./.env.prod:/app/.env.prod:ro
