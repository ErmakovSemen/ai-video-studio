name: Deploy to Render

# SUPERSEDED (2026-07-17): moved off Render to a Timeweb VPS (Amsterdam) — see
# deploy-vps.yml. Render blocked OpenRouter from its own network in some tests and
# the free tier couldn't handle whisper/ffmpeg montage jobs. Kept as workflow_dispatch
# only (no auto-trigger) in case we ever need to fail back to Render manually.

on:
  workflow_dispatch:

concurrency:
  group: render-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: |
          code=$(curl -sS -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_DEPLOY_HOOK }}")
          echo "Render deploy hook responded: $code"
          [ "$code" = "200" ] || [ "$code" = "201" ] || [ "$code" = "202" ] || { echo "deploy trigger failed"; exit 1; }
