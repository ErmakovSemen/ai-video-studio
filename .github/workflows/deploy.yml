name: Deploy to Render

# Reliable auto-deploy: Render's own GitHub webhook ("On Commit") was flaky, so we
# disabled it and trigger the deploy from a GitHub Action instead — fires on every code
# push to master and curls Render's Deploy Hook (stored as the RENDER_DEPLOY_HOOK secret).
# Board/state/docs commits are ignored so board-sync and autopost don't redeploy the app.

on:
  push:
    branches: [master]
    paths-ignore:
      - "content.json"
      - "board.json"
      - "scripts/autopost_state.json"
      - "**.md"
      - "venture-agt/**"
  workflow_dispatch:

concurrency:
  group: render-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: |
          code=$(curl -sS -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_DEPLOY_HOOK }}")
          echo "Render deploy hook responded: $code"
          [ "$code" = "200" ] || [ "$code" = "201" ] || { echo "deploy trigger failed"; exit 1; }
