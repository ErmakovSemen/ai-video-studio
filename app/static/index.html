<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>AI Video Studio — Prometey</title>
<style>
  :root{--bg:#0e0e12;--card:#17171f;--mut:#9a9aa5;--acc:#ff6a2b;--txt:#f5f5f7}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,Segoe UI,Roboto,sans-serif}
  .wrap{max-width:560px;margin:0 auto;padding:28px 18px 60px}
  h1{font-size:22px;margin:0 0 4px}
  .mode{font-size:13px;color:var(--mut);margin-bottom:22px}
  .card{background:var(--card);border-radius:18px;padding:20px;margin-bottom:18px}
  label{display:block;font-size:13px;color:var(--mut);margin:12px 0 6px}
  textarea,input[type=text]{width:100%;background:#0e0e14;border:1px solid #2a2a33;border-radius:12px;
    color:var(--txt);padding:12px;font-size:15px;font-family:inherit;resize:vertical}
  textarea{min-height:74px}
  input[type=file]{font-size:13px;color:var(--mut)}
  button{background:var(--acc);color:#111;border:0;border-radius:12px;padding:13px 18px;font-size:15px;
    font-weight:700;cursor:pointer;width:100%;margin-top:16px}
  button.sec{background:#262630;color:var(--txt)}
  button:disabled{opacity:.5;cursor:default}
  .row{display:flex;gap:10px}.row>*{flex:1}
  video{width:100%;border-radius:14px;margin-top:6px;background:#000}
  .status{font-size:14px;color:var(--mut);margin-top:14px;min-height:20px}
  a.dl{display:inline-block;margin-top:10px;color:var(--acc);text-decoration:none;font-size:14px}
  .hide{display:none}
</style>
</head>
<body>
<div class="wrap">
  <h1>🔥 AI Video Studio</h1>
  <div class="mode" id="mode">…</div>

  <div class="card">
    <label>Описание ролика / сцена</label>
    <textarea id="desc" placeholder="напр.: огненный персонаж сурово смотрит в камеру, тёмный фон, кинематографично"></textarea>
    <label>Озвучка (что произносит голос) — необязательно</label>
    <textarea id="narr" placeholder="напр.: Понедельник — это отмазка с датой. Шаг — сегодня."></textarea>
    <label>Картинка-референс (необязательно — иначе сгенерится)</label>
    <input type="file" id="img" accept="image/*"/>
    <button id="go">Сгенерировать видео</button>
  </div>

  <div class="card hide" id="result">
    <video id="vid" controls playsinline></video>
    <a class="dl" id="dl" download>⬇ Скачать</a>
    <div class="row">
      <button class="sec" id="post">Постить в Telegram</button>
    </div>
    <div class="status" id="pstat"></div>
  </div>

  <div class="status" id="status"></div>
</div>
<script>
let jobId=null;
async function health(){const r=await fetch('/api/health');const d=await r.json();
  const labels={openrouter:'OpenRouter (Kling, реальная генерация)',fal:'FAL (реальная генерация)',
    hf:'Hugging Face (бесплатно, лимит квоты)',mock:'MOCK (превью без генерации)'};
  document.getElementById('mode').textContent =
    'Режим: '+(labels[d.mode]||d.mode)+(d.tg_ready?` · постинг в ${d.channel}`:' · TG не настроен');}
health();
const $=id=>document.getElementById(id);
$('go').onclick=async()=>{
  const desc=$('desc').value.trim(); if(!desc){alert('Опиши ролик');return;}
  $('go').disabled=true; $('status').textContent='Генерация… (может занять до пары минут)';
  $('result').classList.add('hide');
  const fd=new FormData(); fd.append('description',desc); fd.append('narration',$('narr').value);
  if($('img').files[0]) fd.append('image',$('img').files[0]);
  const r=await fetch('/api/generate',{method:'POST',body:fd}); const d=await r.json();
  jobId=d.job_id; poll();
};
async function poll(){
  const r=await fetch('/api/jobs/'+jobId); const d=await r.json();
  if(d.status==='running'){$('status').textContent='Генерация…'; setTimeout(poll,2500); return;}
  $('go').disabled=false;
  if(d.status==='error'){$('status').textContent='Ошибка: '+d.error; return;}
  $('status').textContent='Готово ✅ ('+(d.info&&d.info.mode)+')';
  $('vid').src=d.video; $('dl').href=d.video; $('result').classList.remove('hide');
}
$('post').onclick=async()=>{
  const cap=prompt('Подпись к посту:',''); if(cap===null)return;
  $('pstat').textContent='Публикую…';
  const fd=new FormData(); fd.append('job_id',jobId); fd.append('caption',cap);
  const r=await fetch('/api/post-tg',{method:'POST',body:fd});
  const d=await r.json().catch(()=>({}));
  $('pstat').textContent = d.ok ? 'Опубликовано в канал ✅' : 'Ошибка публикации';
};
</script>
</body>
</html>
