<!doctype html>
<html lang="ru"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>AI Video Studio — Prometey</title>
<style>
  :root{--bg:#0e0e12;--card:#17171f;--mut:#9a9aa5;--acc:#ff6a2b;--txt:#f5f5f7;--ln:#2a2a33}
  *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,Segoe UI,Roboto,sans-serif;line-height:1.45}
  .wrap{max-width:880px;margin:0 auto;padding:24px 16px 80px}
  h1{font-size:22px;margin:0 0 2px}.sub{color:var(--mut);font-size:13px;margin-bottom:20px}
  .card{background:var(--card);border-radius:16px;padding:18px;margin-bottom:16px}
  .card h2{font-size:15px;margin:0 0 12px}
  label{display:block;font-size:12px;color:var(--mut);margin:10px 0 5px}
  select,input,textarea{width:100%;background:#0e0e14;border:1px solid var(--ln);border-radius:10px;
    color:var(--txt);padding:10px;font-size:14px;font-family:inherit}
  textarea{min-height:220px;font-family:ui-monospace,Menlo,monospace;font-size:12.5px;resize:vertical}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:10px}
  button{background:var(--acc);color:#111;border:0;border-radius:10px;padding:11px 16px;font-size:14px;
    font-weight:700;cursor:pointer}button.sec{background:#262630;color:var(--txt)}
  button:disabled{opacity:.5;cursor:default}
  .pill{font-size:12px;color:var(--mut);background:#1f1f29;padding:4px 10px;border-radius:20px}
  video{width:100%;max-width:300px;border-radius:12px;background:#000;display:block;margin-top:8px}
  img.prev{max-width:240px;border-radius:12px;margin-top:8px}
  .status{font-size:13px;color:var(--mut);margin-top:10px;min-height:18px}
  a.dl{color:var(--acc);text-decoration:none;font-size:13px}
  .hide{display:none}
</style></head><body><div class="wrap">
  <h1>🔥 AI Video Studio · <a href="/board" style="color:var(--acc);text-decoration:none;font-size:15px">📋 доска</a></h1>
  <div class="sub" id="meta">…</div>

  <div class="card">
    <h2>1 · Сценарий</h2>
    <div class="row">
      <select id="scList" style="flex:1;min-width:200px"></select>
      <button class="sec" id="load">Загрузить в редактор</button>
    </div>
    <label>JSON сценария (редактируй свободно)</label>
    <textarea id="json" spellcheck="false"></textarea>
    <div class="row">
      <input id="saveName" placeholder="имя для сохранения (напр. sisyphus)" style="flex:1;min-width:160px"/>
      <button class="sec" id="save">💾 Сохранить</button>
    </div>
  </div>

  <div class="card">
    <h2>2 · Рендер</h2>
    <div class="row">
      <button id="draft">▶ Черновик (бесплатно)</button>
      <button id="final" class="sec">★ Финал (Kling · ~$2–3)</button>
      <span class="pill" id="cost"></span>
    </div>
    <div class="row">
      <label style="margin:0;display:flex;align-items:center;gap:6px;color:var(--txt)">
        <input type="checkbox" id="polish" checked style="width:auto"/> 🎬 Монтаж (караоке-субтитры)
      </label>
      <select id="music" style="flex:1;min-width:140px"><option value="">— без музыки —</option></select>
    </div>
    <div class="status" id="rstat"></div>
    <div id="result" class="hide">
      <video id="vid" controls playsinline></video>
      <div class="row">
        <a class="dl" id="dl" download>⬇ Скачать</a>
        <button class="sec" id="post">Постить в Telegram</button>
        <span class="status" id="pstat"></span>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>3 · Быстрая картинка (Gemini)</h2>
    <label>Промпт</label>
    <input id="iprompt" placeholder="напр.: Афина в том же стиле, полный рост"/>
    <label>Референс (для консистентности)</label>
    <select id="iref"><option value="">— без референса —</option></select>
    <div class="row"><button id="genimg" class="sec">🖼 Сгенерировать</button>
      <span class="status" id="istat"></span></div>
    <img id="iout" class="prev hide"/>
  </div>

  <div class="card">
    <h2>4 · Публикация (последнее видео)</h2>
    <div id="pubStatus" class="status">…</div>
    <label>Заголовок</label>
    <input id="pubTitle" placeholder="Прометей — зажги свой огонь 🔥 #Shorts"/>
    <label>Описание</label>
    <textarea id="pubDesc" style="min-height:80px" placeholder="Короткое описание…"></textarea>
    <label>Теги (через запятую)</label>
    <input id="pubTags" placeholder="дисциплина, мотивация, саморазвитие, shorts"/>
    <label>Приватность</label>
    <select id="pubPriv">
      <option value="public">public</option>
      <option value="unlisted">unlisted</option>
      <option value="private">private</option>
    </select>
    <div class="row" id="pubBtns"></div>
    <div class="status" id="pubResult"></div>
  </div>

  <div class="card">
    <h2>5 · Подключение соцсетей</h2>
    <div class="sub" style="margin-bottom:10px">Введи доступы каждой платформы — они сохраняются на сервере. Постинг идёт во все подключённые.</div>
    <div id="settings"></div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id); let job=null;
async function init(){
  const h=await (await fetch('/api/health')).json();
  $('meta').textContent=`видео: ${h.video_model} · картинки: ${h.image_model}`+
    (h.credits!=null?` · баланс ~$${h.credits}`:'')+(h.tg_ready?` · постинг ${h.channel}`:'');
  const sc=await (await fetch('/api/scenarios')).json();
  $('scList').innerHTML=sc.map(s=>`<option value="${s.name}">${s.title}</option>`).join('');
  const as=await (await fetch('/api/assets')).json();
  $('iref').innerHTML='<option value="">— без референса —</option>'+as.map(a=>`<option>${a}</option>`).join('');
  const mu=await (await fetch('/api/music')).json();
  $('music').innerHTML='<option value="">— без музыки —</option>'+mu.map(m=>`<option>${m}</option>`).join('');
}
init();
$('load').onclick=async()=>{const n=$('scList').value;if(!n)return;
  const d=await (await fetch('/api/scenarios/'+n)).json();
  $('json').value=JSON.stringify(d,null,2);$('saveName').value=n;};
$('save').onclick=async()=>{const n=$('saveName').value.trim()||'scenario';
  const fd=new FormData();fd.append('body',$('json').value);
  const r=await fetch('/api/scenarios/'+n,{method:'POST',body:fd});
  $('rstat').textContent=r.ok?'Сохранено ✅':'Ошибка сохранения';init();};
async function render(draft){
  if(!$('json').value.trim()){alert('Вставь/выбери сценарий');return;}
  $('draft').disabled=$('final').disabled=true;$('result').classList.add('hide');
  $('rstat').textContent=draft?'Черновик рендерится (бесплатно)…':'Финал рендерится (Kling, пара минут)…';
  const fd=new FormData();fd.append('body',$('json').value);fd.append('draft',draft);
  fd.append('polish',$('polish').checked);fd.append('music',$('music').value);
  const r=await fetch('/api/render',{method:'POST',body:fd});const d=await r.json();
  if(!r.ok){$('rstat').textContent='Ошибка: '+(d.detail||'');$('draft').disabled=$('final').disabled=false;return;}
  job=d.job_id;poll();
}
$('draft').onclick=()=>render(true);$('final').onclick=()=>{if(confirm('Финал спишет ~$2–3 с OpenRouter. Продолжить?'))render(false);};
async function poll(){const d=await (await fetch('/api/jobs/'+job)).json();
  if(d.status==='running'){setTimeout(poll,3000);return;}
  $('draft').disabled=$('final').disabled=false;
  if(d.status==='error'){$('rstat').textContent='Ошибка: '+d.error;return;}
  $('rstat').textContent='Готово ✅ '+(d.info&&d.info.draft?'(черновик)':'(финал)');
  $('vid').src=d.video;$('dl').href=d.video;$('result').classList.remove('hide');}
$('post').onclick=async()=>{const c=prompt('Подпись к посту:','');if(c===null)return;
  $('pstat').textContent='Публикую…';const fd=new FormData();fd.append('job_id',job);fd.append('caption',c);
  const d=await (await fetch('/api/post-tg',{method:'POST',body:fd})).json().catch(()=>({}));
  $('pstat').textContent=d.ok?'Опубликовано ✅':'Ошибка';};
$('genimg').onclick=async()=>{const p=$('iprompt').value.trim();if(!p)return;
  $('istat').textContent='Генерю…';$('genimg').disabled=true;
  const fd=new FormData();fd.append('prompt',p);if($('iref').value)fd.append('ref',$('iref').value);
  const r=await fetch('/api/image',{method:'POST',body:fd});const d=await r.json().catch(()=>({}));
  $('genimg').disabled=false;
  if(d.image){$('iout').src=d.image;$('iout').classList.remove('hide');$('istat').textContent='Готово ✅';}
  else $('istat').textContent='Ошибка: '+(d.detail||'');};
async function loadPublishers(){
  const ps=await (await fetch('/api/publishers')).json();
  $('pubStatus').innerHTML=ps.map(p=>`${p.label}: `+(p.configured?'✅ готово':'⚙️ не настроено ('+p.needs.join(', ')+')')).join(' · ');
  const wrap=$('pubBtns');wrap.innerHTML='';
  ps.forEach(p=>{const b=document.createElement('button');
    b.textContent='▲ В '+p.label;b.className=p.configured?'':'sec';b.disabled=!p.configured;
    b.onclick=()=>publish(p.name);wrap.appendChild(b);});
}
async function publish(platform){
  if(!job){alert('Сначала отрендери видео (раздел 2)');return;}
  if(!$('pubTitle').value.trim()){alert('Впиши заголовок');return;}
  $('pubResult').textContent='Публикую в '+platform+'…';
  const fd=new FormData();fd.append('job_id',job);fd.append('platform',platform);
  fd.append('title',$('pubTitle').value);fd.append('description',$('pubDesc').value);
  fd.append('tags',$('pubTags').value);fd.append('privacy',$('pubPriv').value);
  const r=await fetch('/api/publish',{method:'POST',body:fd});const d=await r.json().catch(()=>({}));
  if(r.ok&&d.url)$('pubResult').innerHTML='Опубликовано ✅ <a class="dl" href="'+d.url+'" target="_blank">'+d.url+'</a>'+(d.privacy&&d.privacy!=='public'?' · приватность: '+d.privacy:'');
  else $('pubResult').textContent='Ошибка: '+(d.detail||'неизвестно');
}
loadPublishers();
async function loadSettings(){
  const ps=await (await fetch('/api/settings')).json();
  const wrap=$('settings');wrap.innerHTML='';
  ps.forEach(p=>{
    const box=document.createElement('div');
    box.style.cssText='border:1px solid var(--ln);border-radius:12px;padding:12px;margin-bottom:10px';
    const dot=p.configured?'✅':'⚙️';
    let html=`<div style="display:flex;justify-content:space-between;align-items:center">
      <b>${dot} ${p.label}</b><span class="pill">${p.configured?'подключено':'не подключено'}</span></div>`;
    if(p.setup_hint)html+=`<div class="sub" style="margin:6px 0">${p.setup_hint}</div>`;
    p.fields.forEach(f=>{
      const ph=f.set?(f.preview||'сохранено'):'';
      html+=`<label>${f.label}</label><input data-pf="${p.name}.${f.key}" type="${f.secret?'password':'text'}" placeholder="${ph}"/>`;
    });
    html+=`<div class="row"><button class="sec" data-save="${p.name}">💾 Сохранить ${p.label}</button>
      <span class="status" data-stat="${p.name}"></span></div>`;
    box.innerHTML=html;wrap.appendChild(box);
  });
  wrap.querySelectorAll('[data-save]').forEach(btn=>btn.onclick=()=>saveSettings(btn.getAttribute('data-save')));
}
async function saveSettings(platform){
  const vals={};
  document.querySelectorAll(`[data-pf^="${platform}."]`).forEach(inp=>{
    const k=inp.getAttribute('data-pf').split('.')[1];
    if(inp.value.trim())vals[k]=inp.value.trim();
  });
  const st=document.querySelector(`[data-stat="${platform}"]`);st.textContent='Сохраняю…';
  const fd=new FormData();fd.append('body',JSON.stringify(vals));
  const r=await fetch('/api/settings/'+platform,{method:'POST',body:fd});const d=await r.json().catch(()=>({}));
  st.textContent=r.ok?(d.configured?'Подключено ✅':'Сохранено (не хватает полей)'):'Ошибка';
  loadSettings();loadPublishers();
}
loadSettings();
</script></body></html>
