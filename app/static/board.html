<!doctype html>
<html lang="ru"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Prometey — доска</title>
<style>
  :root{--bg:#0e0e12;--card:#17171f;--mut:#9a9aa5;--acc:#ff6a2b;--txt:#f5f5f7;--ln:#2a2a33}
  *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,Segoe UI,Roboto,sans-serif}
  header{padding:16px 20px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--ln)}
  header h1{font-size:18px;margin:0}.muted{color:var(--mut);font-size:13px}
  a.home{color:var(--acc);text-decoration:none;font-size:13px;margin-left:auto}
  .board{display:flex;gap:14px;padding:18px;overflow-x:auto;align-items:flex-start}
  .col{background:#121219;border:1px solid var(--ln);border-radius:14px;min-width:300px;max-width:320px;flex:0 0 auto;padding:10px}
  .col h2{font-size:13px;text-transform:uppercase;letter-spacing:.04em;color:var(--mut);margin:6px 6px 12px;display:flex;justify-content:space-between}
  .card{background:var(--card);border:1px solid var(--ln);border-radius:10px;padding:10px 11px;margin-bottom:9px;cursor:grab}
  .card:active{cursor:grabbing}.card.drag{opacity:.4}
  .card h3{font-size:14px;margin:0 0 4px;font-weight:650}
  .card p{font-size:12px;color:var(--mut);margin:0;line-height:1.4}
  .tags{margin-top:7px;display:flex;gap:5px;flex-wrap:wrap}
  .tag{font-size:10.5px;padding:2px 7px;border-radius:20px;background:#22222c;color:#bdbdc7}
  .tag.posting{background:#1e2a3a;color:#7db4ff}.tag.content{background:#2a1e2e;color:#ff9bd0}
  .tag.product{background:#1e2a23;color:#7fe0a8}.tag.infra{background:#2a261e;color:#e0c07f}
  .tag.blocked{background:#3a1e1e;color:#ff8d8d}
  .col.over{border-color:var(--acc)}
  .add{font-size:12px;color:var(--mut);background:none;border:1px dashed var(--ln);border-radius:8px;
    width:100%;padding:7px;cursor:pointer}
  .save{position:fixed;right:18px;bottom:18px;background:var(--acc);color:#111;border:0;border-radius:24px;
    padding:11px 18px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px #0008}
  .save.dirty{animation:pulse 1.4s infinite}@keyframes pulse{50%{opacity:.6}}
  .card .arts{margin-top:6px;display:flex;gap:6px;font-size:11px;color:var(--mut)}
  .card .arts span{background:#22222c;border-radius:6px;padding:1px 6px}
  /* modal */
  .ov{position:fixed;inset:0;background:#000a;display:none;align-items:flex-start;justify-content:center;z-index:50;overflow:auto;padding:40px 16px}
  .ov.show{display:flex}
  .modal{background:var(--card);border:1px solid var(--ln);border-radius:16px;width:560px;max-width:100%;padding:20px}
  .modal label{display:block;font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.03em;margin:14px 0 5px}
  .modal input,.modal textarea,.modal select{width:100%;background:#0e0e14;border:1px solid var(--ln);border-radius:9px;color:var(--txt);padding:9px;font-size:14px;font-family:inherit}
  .modal textarea{min-height:74px;resize:vertical}
  .modal h3{margin:0;font-size:17px}
  .mhead{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .x{background:none;border:0;color:var(--mut);font-size:22px;cursor:pointer;line-height:1}
  .art video{width:100%;max-width:300px;border-radius:10px;background:#000;display:block;margin-top:6px}
  .art img{max-width:120px;border-radius:8px;margin:6px 6px 0 0;vertical-align:top}
  .art a{display:inline-block;color:#7db4ff;font-size:13px;margin:4px 10px 0 0}
  .mrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:18px}
  .mbtn{background:var(--acc);color:#111;border:0;border-radius:9px;padding:9px 14px;font-size:13px;font-weight:700;cursor:pointer}
  .mbtn.sec{background:#262630;color:var(--txt)}.mbtn.del{background:#3a1e1e;color:#ff9d9d;margin-left:auto}
</style></head><body>
<header>
  <h1 id="title">🔥 Prometey</h1><span class="muted" id="upd"></span>
  <nav style="margin-left:auto;display:flex;gap:14px;font-size:13px">
    <a class="home" href="/">студия</a>
    <a class="home" href="/board?name=board">доска проекта</a>
    <a class="home" href="/content?name=content">контент</a>
  </nav>
</header>
<div class="board" id="board"></div>
<button class="save" id="save">💾 Сохранить</button>
<div class="ov" id="ov"><div class="modal" id="modal"></div></div>
<script>
const $=s=>document.querySelector(s);let data={columns:[]};let dirty=false;
const NAME=new URLSearchParams(location.search).get('name')||'board';
if(window.self!==window.top){const h=document.querySelector('header');if(h)h.style.display='none';}
function tagClass(t){return ['posting','content','product','infra','blocked'].includes(t)?t:'';}
function render(){
  const b=$('#board');b.innerHTML='';
  data.columns.forEach(col=>{
    const c=document.createElement('div');c.className='col';c.dataset.col=col.id;
    c.innerHTML=`<h2>${col.name}<span>${col.cards.length}</span></h2>`;
    col.cards.forEach(card=>{
      const d=document.createElement('div');d.className='card';d.draggable=true;d.dataset.id=card.id;
      const arts=[];if(card.video)arts.push('📹 видео');if((card.images||[]).length)arts.push('🖼 '+card.images.length);
        if((card.links||[]).length)arts.push('🔗 '+card.links.length);if(card.notes)arts.push('📝');
      d.innerHTML=`<h3>${card.title}</h3>${card.desc?`<p>${card.desc}</p>`:''}`+
        `<div class="tags">${(card.tags||[]).map(t=>`<span class="tag ${tagClass(t)}">${t}</span>`).join('')}</div>`+
        (arts.length?`<div class="arts">${arts.map(a=>`<span>${a}</span>`).join('')}</div>`:'');
      let dragging=false;
      d.addEventListener('dragstart',e=>{dragging=true;e.dataTransfer.setData('id',card.id);e.dataTransfer.setData('from',col.id);d.classList.add('drag');});
      d.addEventListener('dragend',()=>{d.classList.remove('drag');setTimeout(()=>dragging=false,50);});
      d.addEventListener('click',()=>{if(!dragging)openCard(col.id,card.id);});
      c.appendChild(d);
    });
    const add=document.createElement('button');add.className='add';add.textContent='+ карточка';
    add.onclick=()=>{const t=prompt('Заголовок задачи:');if(!t)return;
      col.cards.push({id:'c'+Date.now(),title:t,desc:'',tags:[]});markDirty();render();};
    c.appendChild(add);
    c.addEventListener('dragover',e=>{e.preventDefault();c.classList.add('over');});
    c.addEventListener('dragleave',()=>c.classList.remove('over'));
    c.addEventListener('drop',e=>{e.preventDefault();c.classList.remove('over');
      const id=e.dataTransfer.getData('id'),from=e.dataTransfer.getData('from');
      if(from===col.id)return;move(id,from,col.id);});
    b.appendChild(c);
  });
}
function move(id,from,to){
  const fc=data.columns.find(c=>c.id===from),tc=data.columns.find(c=>c.id===to);
  const i=fc.cards.findIndex(c=>c.id===id);if(i<0)return;
  tc.cards.unshift(fc.cards.splice(i,1)[0]);markDirty();render();
}
function markDirty(){dirty=true;$('#save').classList.add('dirty');}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}
let cur=null;
function openCard(colId,cardId){
  const col=data.columns.find(c=>c.id===colId);const card=col.cards.find(c=>c.id===cardId);if(!card)return;
  cur={col,card};
  const opts=data.columns.map(c=>`<option value="${c.id}"${c.id===colId?' selected':''}>${esc(c.name)}</option>`).join('');
  const vid=card.video?`<div class="art"><video src="${esc(card.video)}" controls playsinline></video></div>`:'';
  const imgs=(card.images||[]).length?`<div class="art">${card.images.map(s=>`<img src="${esc(s)}"/>`).join('')}</div>`:'';
  const links=(card.links||[]).length?`<div class="art">${card.links.map(l=>`<a href="${esc(l.url)}" target="_blank" rel="noopener">${esc(l.label||l.url)} ↗</a>`).join('')}</div>`:'';
  const hasArt=vid||imgs||links;
  document.getElementById('modal').innerHTML=
    `<div class="mhead"><h3>Карточка</h3><button class="x" id="m_x">✕</button></div>
     <label>Заголовок</label><input id="m_title" value="${esc(card.title)}">
     <label>Стадия</label><select id="m_col">${opts}</select>
     <label>Описание</label><textarea id="m_desc">${esc(card.desc)}</textarea>
     <label>Заметки · что дальше</label><textarea id="m_notes" placeholder="напр.: отдать монтажёру; проверить субтитры…">${esc(card.notes)}</textarea>
     <label>Теги (через запятую)</label><input id="m_tags" value="${esc((card.tags||[]).join(', '))}">
     ${hasArt?'<label>Артефакты</label>'+vid+imgs+links:''}
     <label>Добавить артефакт</label>
     <input id="m_vid" placeholder="видео URL (напр. /outputs/x.mp4 или /media/x.mp4)" value="${esc(card.video)}">
     <input id="m_link" placeholder="ссылка: подпись | https://…" style="margin-top:6px">
     <div class="mrow">
       <button class="mbtn" id="m_save">💾 Сохранить</button>
       <button class="mbtn sec" id="m_close">Закрыть</button>
       <button class="mbtn del" id="m_del">Удалить</button>
     </div>`;
  document.getElementById('ov').classList.add('show');
  document.getElementById('m_x').onclick=closeCard;
  document.getElementById('m_close').onclick=closeCard;
  document.getElementById('m_del').onclick=()=>{if(confirm('Удалить карточку?')){const i=col.cards.indexOf(card);col.cards.splice(i,1);persist();closeCard();render();}};
  document.getElementById('m_save').onclick=saveCard;
}
function closeCard(){document.getElementById('ov').classList.remove('show');cur=null;}
function saveCard(){
  const card=cur.card,from=cur.col;
  card.title=document.getElementById('m_title').value.trim()||card.title;
  card.desc=document.getElementById('m_desc').value.trim();
  card.notes=document.getElementById('m_notes').value.trim();
  card.tags=document.getElementById('m_tags').value.split(',').map(s=>s.trim()).filter(Boolean);
  const v=document.getElementById('m_vid').value.trim();card.video=v||undefined;
  const lk=document.getElementById('m_link').value.trim();
  if(lk){const p=lk.split('|');card.links=card.links||[];card.links.push(p.length>1?{label:p[0].trim(),url:p[1].trim()}:{url:p[0].trim()});}
  const newCol=document.getElementById('m_col').value;
  if(newCol!==from.id){const i=from.cards.indexOf(card);from.cards.splice(i,1);data.columns.find(c=>c.id===newCol).cards.unshift(card);}
  persist();render();closeCard();
}
async function persist(){markDirty();const fd=new FormData();fd.append('body',JSON.stringify(data));
  const r=await fetch('/api/kanban/'+NAME,{method:'POST',body:fd});
  if(r.ok){dirty=false;$('#save').classList.remove('dirty');}}
document.getElementById('ov').addEventListener('click',e=>{if(e.target.id==='ov')closeCard();});
$('#save').onclick=async()=>{
  const fd=new FormData();fd.append('body',JSON.stringify(data));
  const r=await fetch('/api/kanban/'+NAME,{method:'POST',body:fd});
  if(r.ok){dirty=false;$('#save').classList.remove('dirty');$('#save').textContent='Сохранено ✅';
    setTimeout(()=>$('#save').textContent='💾 Сохранить',1500);}
};
(async()=>{data=await (await fetch('/api/kanban/'+NAME)).json();
  $('#title').textContent='🔥 '+(data.title||'Prometey');
  $('#upd').textContent='обновлено '+(data.updated||'');render();})();
</script></body></html>
