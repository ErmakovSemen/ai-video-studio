<!doctype html><html lang="ru"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Вход · Прометей</title>
<link rel="stylesheet" href="/static/ds.css">
<style>
.auth{min-height:100vh;display:grid;place-items:center;padding:24px}
.card{width:100%;max-width:400px}
.card .head{text-align:center;margin-bottom:22px}
.card .head .logo{font-size:19px;margin-bottom:14px}
.card .head .logo .flame{width:34px;height:34px;font-size:19px;border-radius:9px}
.card h1{font-size:26px;margin-bottom:6px}
.card .head p{color:var(--mut);font-size:13px;margin:0}
.box{padding:26px 24px 22px}
.err{background:rgba(255,93,108,.1);border:1px solid rgba(255,93,108,.35);color:#ffb3bb;font-size:13px;border-radius:10px;padding:10px 12px;margin-bottom:14px;display:none}
.err.on{display:block}
.alt{text-align:center;margin-top:16px;font-size:13px;color:var(--mut)}
.alt a{color:var(--ember);font-weight:500}
.foot{text-align:center;margin-top:18px}
.live{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--faint)}
</style></head><body>
<div class="auth">
  <div class="card">
    <div class="head">
      <div class="logo"><span class="flame">🔥</span> ПРОМЕТЕЙ</div>
      <h1>С возвращением</h1>
      <p>Твоя фабрика контента ждёт</p>
    </div>
    <div class="pcard box">
      <div class="err" id="err">Неверный email или пароль. Попробуй ещё раз.</div>
      <form method="post" action="/api/login">
        <div class="field"><label>Email или логин</label><input name="username" type="text" placeholder="you@company.com" autocomplete="username" autofocus></div>
        <div class="field"><label>Пароль</label><input name="password" type="password" placeholder="••••••••" autocomplete="current-password" required></div>
        <button class="btn btn-primary btn-block" type="submit">Войти в кабинет</button>
      </form>
      <div class="alt"><a href="/recover">Забыли пароль?</a></div>
    </div>
    <div class="alt">Ещё нет аккаунта? <a href="/register">Создать</a></div>
    <div class="foot"><span class="live"><span class="dot live"></span> агенты на смене · фабрика работает</span></div>
  </div>
</div>
<script>if(new URLSearchParams(location.search).get('e'))document.getElementById('err').classList.add('on')</script>
</body></html>
