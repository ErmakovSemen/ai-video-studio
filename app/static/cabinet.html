<!doctype html>
<html lang="ru"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Prometey — кабинет</title>
<style>
  :root{--bg:#0e0e12;--card:#17171f;--mut:#9a9aa5;--acc:#ff6a2b;--txt:#f5f5f7;--ln:#2a2a33}
  *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,Segoe UI,Roboto,sans-serif}
  header{padding:14px 22px;display:flex;align-items:center;gap:16px;border-bottom:1px solid var(--ln)}
  header h1{font-size:18px;margin:0}nav{display:flex;gap:16px;font-size:13px}
  nav a,.lo{color:var(--acc);text-decoration:none}.lo{margin-left:auto;color:var(--mut)}
  .wrap{max-width:1100px;margin:0 auto;padding:22px 18px 60px}
  h2{font-size:15px;margin:24px 0 12px}
  .tiles{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px}
  .tile{background:var(--card);border:1px solid var(--ln);border-radius:14px;padding:16px 18px;text-decoration:none;color:var(--txt);flex:1;min-width:200px}
  .tile b{display:block;font-size:15px}.tile span{color:var(--mut);font-size:12.5px}
  .conn{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px}
  .pf{background:var(--card);border:1px solid var(--ln);border-radius:14px;padding:14px}
  .pf .row{display:flex;justify-content:space-between;align-items:center}
  .pf b{font-size:15px}.pill{font-size:11.5px;padding:3px 9px;border-radius:20px;background:#22222c;color:#bdbdc7}
  .pill.ok{background:#1e2a23;color:#7fe0a8}.pf .hint{color:var(--mut);font-size:12px;margin:8px 0 12px;line-height:1.4}
  .btn{display:inline-block;background:var(--acc);color:#111;border:0;border-radius:9px;padding:9px 14px;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none}
  .btn.sec{background:#262630;color:var(--txt)}
  iframe{width:100%;height:560px;border:1px solid var(--ln);border-radius:14px;background:#0e0e12}
</style></head><body>
<header>
  <h1>🔥 Prometey — кабинет</h1>
  <nav>
    <a href="/">студия</a>
    <a href="/board?name=board">доска проекта</a>
    <a href="/content?name=content">контент</a>
  </nav>
  <a class="lo" href="/logout">выйти</a>
</header>
<div class="wrap">
  <div class="tiles">
    <a class="tile" href="/"><b>🎬 Студия</b><span>генерация, монтаж, постинг</span></a>
    <a class="tile" href="/content?name=content"><b>📋 Контент-доска</b><span>видео по стадиям</span></a>
    <a class="tile" href="/board?name=board"><b>🗺 Доска проекта</b><span>развитие продукта</span></a>
  </div>

  <h2>🔌 Подключения соцсетей</h2>
  <div class="conn" id="conn"></div>

  <h2>🎬 Производство контента</h2>
  <iframe src="/content?name=content" title="Контент-доска"></iframe>
</div>
<script>
(async()=>{
  const ps=await (await fetch('/api/settings')).json();
  const wrap=document.getElementById('conn');
  ps.forEach(p=>{
    const d=document.createElement('div');d.className='pf';
    d.innerHTML=`<div class="row"><b>${p.label}</b>
      <span class="pill ${p.configured?'ok':''}">${p.configured?'✅ подключено':'не подключено'}</span></div>
      <div class="hint">${p.setup_hint||''}</div>
      <a class="btn ${p.configured?'sec':''}" href="/connect/${p.name}">${p.configured?'Настроить':'▶ Запустить '+p.label}</a>`;
    wrap.appendChild(d);
  });
})();
</script>
</body></html>
